spring:
  application:
    name: serenity-ai
  threads:
    virtual:
      enabled: true # Enable Java 21 Virtual Threads

  datasource:
    url: jdbc:postgresql://localhost:5432/serenity_db
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.batch_size: 25

  liquibase:
    change-log: classpath:db/changelog-master.yaml
    enabled: true

  data:
    redis:
      repositories:
        enabled: false
      host: ${REDIS_HOST:localhost}
      port: 6379

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2000

app:
  firebase:
    service-account-base64: ${FIREBASE_SERVICE_ACCOUNT_B64}

security:
  jwt:
    secret: ${JWT_SECRET_KEY}
    expiration: 3600000 # 1 hour
    refresh-expiration: 604800000 # 7 days

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never
