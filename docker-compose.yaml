services:
  postgres:
    image: postgres:15-alpine
    container_name: serenity-db
    environment:
      POSTGRES_DB: serenity_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: serenity-cache
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: serenity-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/serenity_db
      SPRING_DATA_REDIS_HOST: redis
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FIREBASE_SERVICE_ACCOUNT_B64: ${FIREBASE_SERVICE_ACCOUNT_B64}
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
